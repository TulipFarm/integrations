name: slack
version: 1.0.0
description: Send messages, read channels, and search Slack from TulipFarm agents.
maintainer: TulipFarm

egress:
  type: mcp
  entry:
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-slack"]

setup_guide_path: SETUP.md

required_env:
  - name: SLACK_BOT_TOKEN
    label: Bot Token
    description: "xoxb-... token from your Slack app. Fill this to connect directly, or use OAuth below."
    secret: true
    steps:
      - Go to api.slack.com/apps and open your app
      - Click OAuth & Permissions → Install to workspace
      - Copy the Bot User OAuth Token (xoxb-...)
    setup_url: https://api.slack.com/apps

  - name: SLACK_TEAM_ID
    label: Team ID
    description: "Your workspace ID — starts with T (e.g. T012AB3CD)."
    secret: false
    steps:
      - Open Slack in a browser
      - Go to your workspace settings
      - The Team ID is shown in the URL as the T... segment
    setup_url: https://api.slack.com/methods/auth.test

  - name: SLACK_CLIENT_ID
    label: OAuth Client ID
    description: App credentials → Client ID. Required only for OAuth flow.
    secret: false
    steps:
      - Go to api.slack.com/apps and open your app
      - Click Basic Information → App Credentials
      - Copy the Client ID
    setup_url: https://api.slack.com/apps

  - name: SLACK_CLIENT_SECRET
    label: OAuth Client Secret
    description: App credentials → Client Secret. Required only for OAuth flow.
    secret: true
    steps:
      - Go to api.slack.com/apps and open your app
      - Click Basic Information → App Credentials
      - Copy the Client Secret
    setup_url: https://api.slack.com/apps

oauth:
  flows:
    authorizationCode:
      authorizationUrl: https://slack.com/oauth/v2/authorize
      tokenUrl: https://slack.com/api/oauth.v2.access
      scopes:
        channels:history: Read message history from public channels
        channels:read: View basic channel info
        chat:write: Send messages as the app
        groups:history: Read message history from private channels
        groups:read: View basic private channel info
        im:history: Read direct message history
        im:read: View basic DM info
        mpim:history: Read group DM history
        mpim:read: View basic group DM info
        reactions:read: View emoji reactions
        reactions:write: Add emoji reactions
        users:read: View people in a workspace
        "users:read.email": View email addresses of people in a workspace
  x-tulipfarm:
    client_id_env: SLACK_CLIENT_ID
    client_secret_env: SLACK_CLIENT_SECRET
    token_env: SLACK_BOT_TOKEN
    token_response_path: access_token
